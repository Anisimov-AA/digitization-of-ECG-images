# ECG Digitization Pipeline Config

paths:
  kaggle_dir: "/kaggle/input/competitions/physionet-ecg-image-digitization"
  hengck23_dir: "/kaggle/input/datasets/hengck23/hengck23-demo-submit-physionet"
  someya_dir: "/kaggle/input/datasets/takashisomeya/physionet-final-submission-models"
  out_dir: "/kaggle/working/outputs"

inference:
  float_type: "float16" # float16 or bfloat16
  tta: [0, 2] # 0=no flip, 2=horizontal flip

stage2:
  img_h: 1700
  img_w_scale: 5000.0 # x_scale = 5000 / (2080 - 118)
  img_w_denom: 1962.0 # 2080 - 118
  add_x: 1
  offset: 416
  window_size: 240
  ignore_edge: 8
  x0: 0
  x1: 5600
  y0: 0
  y1: 1696
  zero_mv: [703.5, 987.5, 1271.5, 1531.5]
  mv_to_pixel: 79.0
  t0_raw: 118 # t0 = int(118 * x_scale) + add_x
  t1_raw: 2080 # t1 = int(2080 * x_scale) + add_x

models:
  whole:
    - encoder: "tu-timm/tf_efficientnet_b7.ns_jft_in1k"
      weight: "whole_b7_lb22.93.pth"
    - encoder: "tu-timm/tf_efficientnetv2_l.in21k"
      weight: "whole_v2_l_lb22.60.pth"

  lead:
    - encoder: "tu-timm/tf_efficientnet_b6.ns_jft_in1k"
      weight: "series_b6_shared_conv2d_lb23.10.pth"
      fusion: "shared_conv2d"
    - encoder: "tu-timm/tf_efficientnet_b6.ns_jft_in1k"
      weight: "series_b6_shared_conv2d_lb23.00.pth"
      fusion: "shared_conv2d"
    - encoder: "tu-timm/tf_efficientnetv2_l.in21k"
      weight: "series_v2_l_conv3d_lb22.92.pth"
      fusion: "conv3d"
    - encoder: "tu-timm/tf_efficientnetv2_l.in21k"
      weight: "series_v2_l_conv2d_lb22.85.pth"
      fusion: "conv2d"
